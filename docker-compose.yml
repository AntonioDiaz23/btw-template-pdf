services:
  postgres:
    image: postgres:18-alpine
    container_name: btw-template-pdf-db
    environment:
      POSTGRES_USER: btw
      POSTGRES_PASSWORD: btw
      POSTGRES_DB: btw_template_pdf
    ports:
      - "5433:5432"
    volumes:
      - btw_template_pdf_pg:/var/lib/postgresql/data
volumes:
  btw_template_pdf_pg:
